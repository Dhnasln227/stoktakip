<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stok Pro | Satış</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #22c55e; --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        @keyframes pop { 0% { transform: scale(0.95); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .products-section { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; background: #ebf1f7; }
        .top-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-input { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 15px; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .p-item { 
            background: var(--card); padding: 15px; border-radius: 20px; text-align: center; 
            cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 2px solid transparent; display: flex; flex-direction: column; justify-content: space-between; min-height: 120px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }
        .p-item:active { transform: scale(0.9); background: #f0fdf4; border-color: var(--primary); }
        .p-item h4 { margin: 0; font-size: 14px; color: #334155; }

        .cart-section { width: 380px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0,0,0,0.05); }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f1f5f9; animation: fadeIn 0.3s ease; }
        
        .btn-pay { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-pay:hover { filter: brightness(1.1); }
        .btn-pay:active { transform: scale(0.96); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-box { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; }

        .success-overlay { position: fixed; inset: 0; background: rgba(34, 197, 94, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; color: white; animation: fadeIn 0.3s; }

        @media (max-width: 768px) { body { flex-direction: column; } .cart-section { width: 100%; height: 50%; } }

        /* ADİSYON YAZDIRMA CSS */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 80mm; font-family: 'Courier New', monospace; padding: 5px; color: black; background: white;}
        }
        #printArea { display: none; }
    </style>
</head>
<body>

<div id="printArea"></div>

<div id="successOverlay" class="success-overlay">
    <i class="fas fa-check-circle fa-5x" style="animation: pop 0.5s"></i>
    <h1 style="margin-top:20px">SATIŞ TAMAMLANDI</h1>
</div>

<div class="products-section">
    <div class="top-bar">
        <a href="index.html" style="background:white; padding:12px 18px; border-radius:15px; text-decoration:none; color:#333; display:flex; align-items:center; justify-content:center;"><i class="fas fa-arrow-left"></i></a>
        <input type="text" class="search-input" id="searchBox" placeholder="Ürün ara..." onkeyup="renderProducts()">
        <button onclick="document.getElementById('excelModal').style.display='flex'" style="background:#166534; color:white; border:none; padding:0 20px; border-radius:15px; cursor:pointer;"><i class="fas fa-file-excel"></i></button>
    </div>
    <div class="product-grid" id="productGrid"></div>
</div>

<div class="cart-section">
    <div style="padding:20px; border-bottom:1px solid #eee; text-align:center">
        <h3 id="stName" style="margin:0; color:var(--primary)">SATIŞ PANELİ</h3>
    </div>
    <div class="cart-items" id="cartItems" style="flex:1; overflow-y:auto; padding:10px"></div>
    <div style="padding:20px; background:#f8fafc">
        <div style="display:flex; justify-content:space-between; font-size:24px; font-weight:800; margin-bottom:15px">
            <span>TOPLAM</span><span id="totalTutar" style="color:var(--primary)">0.00 TL</span>
        </div>
        <button class="btn-pay" onclick="completeSale()">ONAYLA VE FİŞ YAZDIR</button>
    </div>
</div>

<div id="excelModal" class="modal">
    <div class="modal-box" style="text-align:left">
        <h3 style="text-align:center; margin-top:0">Excel Veri Yükleme</h3>
        <p style="font-size:13px; color:#666; text-align:center">Önce şablonu indirin, verilerinizi doldurup geri yükleyin.</p>
        
        <div style="background:#f1f5f9; padding:15px; border-radius:15px; margin-bottom:20px">
            <p style="font-size:12px; margin:0 0 10px 0; font-weight:bold">Gerekli Sütun Sırası:</p>
            <p style="font-size:12px; margin:0; font-family:monospace">1. Adı | 2. Birim | 3. Fiyat | 4. Miktar</p>
            <button onclick="downloadSampleExcel()" style="width:100%; background:#4361ee; color:white; border:none; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:15px">
                <i class="fas fa-download"></i> ÖRNEK ŞABLON İNDİR
            </button>
        </div>

        <input type="file" id="exInput" accept=".xlsx, .xls" onchange="importExcel(this)" style="display:none">
        <button class="btn-pay" onclick="document.getElementById('exInput').click()">DOSYA SEÇ VE YÜKLE</button>
        <button onclick="document.getElementById('excelModal').style.display='none'" style="width:100%; margin-top:10px; border:none; background:none; color:#999; cursor:pointer">İptal Et</button>
    </div>
</div>

<div id="kgModal" class="modal">
    <div class="modal-box">
        <h3 id="kgName" style="margin-top:0">Ürün</h3>
        <input type="number" id="kgVal" step="0.001" placeholder="0.000" style="width:100%; font-size:30px; text-align:center; padding:15px; border:2px solid var(--primary); border-radius:15px">
        <p id="kgUnitHint" style="margin-top:10px; color:#666; font-size:14px;"></p>
        <button class="btn-pay" style="margin-top:20px" onclick="confirmKg()">SEPETE EKLE</button>
        <button onclick="document.getElementById('kgModal').style.display='none'" style="width:100%; margin-top:10px; border:none; background:none; color:#999; cursor:pointer">Vazgeç</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('stok_takip_v2')) || [];
    let salesHistory = JSON.parse(localStorage.getItem('sales_history')) || [];
    let cart = [];
    let curItem = null;

    window.onload = () => {
        if(!sessionStorage.getItem('stok_pro_session')) window.location.href = 'index.html';
        document.getElementById('stName').innerText = (localStorage.getItem('stok_pro_store_name') || "SATIŞ").toUpperCase();
        renderProducts();
    };

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        const s = document.getElementById('searchBox').value.toLowerCase();
        grid.innerHTML = "";
        db.filter(x => x.name.toLowerCase().includes(s)).forEach(item => {
            const div = document.createElement('div');
            div.className = "p-item";
            div.onclick = () => {
                if(item.unit === "KG" || item.unit === "Litre") {
                    curItem = item;
                    document.getElementById('kgName').innerText = item.name;
                    document.getElementById('kgUnitHint').innerText = "Miktarı " + item.unit + " cinsinden giriniz.";
                    document.getElementById('kgVal').value = "";
                    document.getElementById('kgModal').style.display = 'flex';
                    setTimeout(() => document.getElementById('kgVal').focus(), 100);
                } else { 
                    addToCart(item, 1);
                }
            };
            div.innerHTML = `<h4>${item.name}</h4><div><b style="color:var(--primary)">${item.price.toFixed(2)} TL</b><br><small style="color:#64748b">Stok: ${Number(item.qty).toFixed(item.unit === 'Adet' ? 0 : 2)}</small></div>`;
            grid.appendChild(div);
        });
    }

    function confirmKg() {
        const v = parseFloat(document.getElementById('kgVal').value);
        if(v > 0) { 
            addToCart(curItem, v); 
            document.getElementById('kgModal').style.display = 'none'; 
        }
    }

    function addToCart(p, q) {
        const ex = cart.find(x => x.id === p.id);
        if(ex) ex.cartQty += q; else cart.push({ ...p, cartQty: q });
        renderCart();
    }

    function renderCart() {
        const c = document.getElementById('cartItems');
        c.innerHTML = "";
        let t = 0;
        cart.forEach(i => {
            t += (i.price * i.cartQty);
            const d = document.createElement('div');
            d.className = "cart-item";
            d.innerHTML = `
                <div style="flex:1"><b>${i.name}</b><br><small>${Number(i.cartQty).toFixed(i.unit === 'Adet' ? 0 : 3)} ${i.unit || 'Adet'} x ${i.price.toFixed(2)}</small></div>
                <div style="font-weight:800; margin-right:15px">${(i.price * i.cartQty).toFixed(2)}</div>
                <div style="display:flex; gap:5px">
                    <button onclick="updateQty(${i.id}, ${i.unit === 'Adet' ? -1 : -0.1})" style="border:none; width:30px; height:30px; border-radius:8px; background:#f1f5f9; font-weight:bold; cursor:pointer">-</button>
                    <button onclick="updateQty(${i.id}, ${i.unit === 'Adet' ? 1 : 0.1})" style="border:none; width:30px; height:30px; border-radius:8px; background:#f1f5f9; font-weight:bold; cursor:pointer">+</button>
                </div>`;
            c.appendChild(d);
        });
        document.getElementById('totalTutar').innerText = t.toFixed(2) + " TL";
    }

    function updateQty(id, delta) {
        const i = cart.find(x => x.id === id);
        if(i) { 
            i.cartQty += delta; 
            if(i.cartQty <= 0) cart = cart.filter(x => x.id !== id); 
        }
        renderCart();
    }

    function printReceipt(total) {
        const storeName = localStorage.getItem('stok_pro_store_name') || "PATISSERIE";
        let itemsHtml = "";

        cart.forEach(i => {
            const lineTotal = i.price * i.cartQty;
            itemsHtml += `
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
                    <span style="flex:1">${i.name} (${Number(i.cartQty).toFixed(i.unit === 'Adet' ? 0 : 2)})</span>
                    <span>${lineTotal.toFixed(2)}</span>
                </div>`;
        });

        const printContent = `
            <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px">
                <h2 style="margin:0; font-size:18px;">${storeName}</h2>
                <small>${new Date().toLocaleString('tr-TR')}</small>
            </div>
            ${itemsHtml}
            <div style="border-top:1px dashed #000; margin-top:10px; padding-top:10px; display:flex; justify-content:space-between; font-weight:bold; font-size:14px">
                <span>TOPLAM:</span>
                <span>${total.toFixed(2)} TL</span>
            </div>
            <div style="text-align:center; margin-top:20px; font-size:11px">Afiyet Olsun - Yine Bekleriz</div>
            <div style="text-align:center; margin-top:5px; font-size:9px; color:#555">Design by Duhan Aslan</div>
        `;

        const printArea = document.getElementById('printArea');
        printArea.innerHTML = printContent;
        printArea.style.display = 'block';
        window.print();
        printArea.style.display = 'none';
    }

    function completeSale() {
        if(cart.length === 0) return;
        
        if(confirm("Satışı tamamla ve adisyon yazdırılsın mı?")) {
            const totalSale = cart.reduce((acc, curr) => acc + (curr.price * curr.cartQty), 0);
            
            // Fiş Yazdırma
            printReceipt(totalSale);
            
            // Satış Geçmişine Ekleme
            const todayStr = new Date().toLocaleDateString('tr-TR');
            const timeStr = new Date().toLocaleTimeString('tr-TR');
            const itemsSold = cart.map(i => `${i.name} (${Number(i.cartQty).toFixed(i.unit === 'Adet' ? 0 : 2)} ${i.unit})`).join(' + ');
            
            salesHistory.push({
                id: Date.now(),
                date: todayStr,
                time: timeStr,
                total: totalSale,
                items: itemsSold
            });
            localStorage.setItem('sales_history', JSON.stringify(salesHistory));

            // Stoktan Düşme
            cart.forEach(ci => { 
                const target = db.find(d => d.id === ci.id); 
                if(target) target.qty -= ci.cartQty; 
            });
            localStorage.setItem('stok_takip_v2', JSON.stringify(db));
            
            const overlay = document.getElementById('successOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                cart = []; 
                renderCart(); 
                renderProducts();
            }, 1500);
        }
    }

    function downloadSampleExcel() {
        const data = [
            ["Ürün Adı", "Birim", "Fiyat", "Miktar"],
            ["Fıstıklı Baklava", "KG", 450, 15],
            ["Ekmek Kadayıfı", "Adet", 120, 20],
            ["Ev Yapımı Limonata", "Litre", 85, 30]
        ];
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Örnek Stok Yükleme");
        XLSX.writeFile(wb, "stok_yukleme_sablonu.xlsx");
    }

    function importExcel(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const newItems = json.map(r => {
                const row = Object.values(r);
                return {
                    id: Date.now() + Math.random(),
                    name: String(row[0] || "İsimsiz Ürün"),
                    unit: String(row[1] || "Adet"),
                    price: parseFloat(row[2] || 0),
                    qty: parseFloat(row[3] || 0)
                };
            });
            db = [...db, ...newItems];
            localStorage.setItem('stok_takip_v2', JSON.stringify(db));
            renderProducts();
            document.getElementById('excelModal').style.display='none';
            alert(newItems.length + " ürün başarıyla eklendi.");
        };
        reader.readAsArrayBuffer(input.files[0]);
    }
</script>
</body>
</html>
